<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body{font-family:Arial;margin:0;background:#0a2448;color:white;}
.login{height:100vh;display:flex;justify-content:center;align-items:center;}
.login-box{background:white;color:black;padding:30px;border-radius:12px;width:300px;}
input,button{width:100%;margin-top:10px;padding:10px;}
button{background:#0a2448;color:white;border:none;cursor:pointer;}
.panel{display:none;padding:20px;}
.card{background:white;color:black;padding:15px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h3>Panel administrativo</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>
</div>

<div class="panel" id="panel"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxDRCtfHNT_PB3SK299zLCfSdQNwQkm7XddSl7Mt4YALjECIrJMzCdGiFnS151ql7ah/exec";

function login(){
  if(document.getElementById("user").value==="admin" &&
     document.getElementById("pass").value==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    cargar();
  }
}

async function cargar(){
  const res = await fetch(API_URL);
  const data = await res.json();
  const panel = document.getElementById("panel");
  panel.innerHTML="";

  data.forEach(m=>{
    panel.innerHTML+=`
      <div class="card">
        <b>${m.materia}</b><br>
        Comisión: ${m.comision}<br>
        Día: ${m.dia}<br>
        Horario: ${m.horario_inicio} - ${m.horario_fin}<br>
        <input placeholder="Nueva aula" id="aula_${m.id}">
        <button onclick="cambiarAula('${m.id}')">Cambiar aula</button>
        <button onclick="suspender('${m.id}')">Suspender</button>
      </div>
    `;
  });
}

async function cambiarAula(id){
  const aula=document.getElementById("aula_"+id).value;
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({accion:"cambio_aula",id,aula})
  });
  cargar();
}

async function suspender(id){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({accion:"suspension",id})
  });
  cargar();
}

</script>

</body>
</html>
