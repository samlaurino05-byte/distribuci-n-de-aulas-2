<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantalla institucional UCA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }
    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #060606 0%, #111 100%);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 28px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 8px;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
    }
    .sub {
      margin-top: 4px;
      color: rgba(255,255,255,.65);
      font-size: 18px;
    }
    .clock {
      text-align: right;
    }
    .clock-time {
      font-size: 22px;
      font-weight: 700;
    }
    .clock-sub {
      color: rgba(255,255,255,.45);
      font-size: 14px;
      margin-top: 4px;
    }
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 28px 0;
    }
    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }
    .eco { background: #f97316; color: #fff; }
    .der { background: #7c3aed; color: #fff; }
    .sal { background: #3b82f6; color: #fff; }
    .qui { background: #facc15; color: #111; }
    .status-live { background: #10b981; color: #fff; }
    .status-soon { background: #9ca3af; color: #fff; }
    .content {
      flex: 1;
      padding: 18px 28px 20px;
      display: flex;
      align-items: stretch;
    }
    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      align-content: start;
    }
    .card {
      border-radius: 26px;
      padding: 18px;
      min-height: 240px;
      max-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #111;
      border: 2px solid transparent;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .card.eco { background: #fff7ed; border-color: #fed7aa; }
    .card.der { background: #f5f3ff; border-color: #ddd6fe; }
    .card.sal { background: #eff6ff; border-color: #bfdbfe; }
    .card.qui { background: #fefce8; border-color: #fde68a; }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .faculty-tag {
      max-width: 165px;
      text-align: center;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 700;
      border-radius: 999px;
      padding: 8px 10px;
    }
    .card.eco .faculty-tag { background: #f97316; color: #fff; }
    .card.der .faculty-tag { background: #7c3aed; color: #fff; }
    .card.sal .faculty-tag { background: #3b82f6; color: #fff; }
    .card.qui .faculty-tag { background: #facc15; color: #111; }
    .status-tag {
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-tag.live { background: #10b981; color: #fff; font-size: 12px; }
    .status-tag.soon { background: #9ca3af; color: #fff; font-size: 11px; }
    .title {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      margin: 0 0 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .info {
      display: grid;
      gap: 10px;
      margin-top: auto;
      font-size: 18px;
    }
    .info-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .icon {
      width: 22px;
      text-align: center;
      flex: 0 0 22px;
    }
    .empty {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-box {
      width: min(1100px, 100%);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      padding: 56px 40px;
      text-align: center;
    }
    .empty-box h2 {
      margin: 0 0 16px;
      font-size: 52px;
    }
    .empty-box p {
      margin: 0;
      color: rgba(255,255,255,.65);
      font-size: 24px;
      line-height: 1.35;
    }
    .footer {
      border-top: 1px solid rgba(255,255,255,.08);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      color: rgba(255,255,255,.45);
      font-size: 16px;
    }
  
  @media (max-width: 1200px){
    .grid{
      grid-template-columns:repeat(3, minmax(0,1fr));
    }
    .content{
      overflow:auto;
    }
    .card{
      min-height:220px;
    }
  }

  @media (max-width: 900px){
    body{
      overflow:auto;
      cursor:auto;
    }
    .screen{
      min-height:100vh;
      height:auto;
    }
    .header{
      flex-direction:column;
      align-items:flex-start;
    }
    .clock{
      text-align:left;
    }
    .grid{
      grid-template-columns:repeat(2, minmax(0,1fr));
      height:auto;
    }
    .content{
      overflow:auto;
    }
    .card{
      min-height:220px;
      height:auto;
    }
    .footer{
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }
  }

  @media (max-width: 640px){
    body{
      overflow:auto;
      cursor:auto;
    }
    .legend{
      gap:6px;
    }
    .grid{
      grid-template-columns:1fr;
      height:auto;
    }
    .content{
      overflow:auto;
    }
    .card{
      height:auto;
      min-height:200px;
    }
    .top{
      flex-direction:column;
      align-items:flex-start;
    }
    .fac,
    .status{
      max-width:100%;
    }
  }

  @media (max-height: 760px){
    .header{
      padding:10px 16px 8px;
    }
    .logo{
      width:44px;
      height:44px;
    }
    .title{
      font-size:24px;
    }
    .sub{
      font-size:12px;
    }
    .legend{
      padding:8px 16px 0;
    }
    .pill{
      padding:6px 10px;
      font-size:11px;
    }
    .content{
      padding:10px 16px;
    }
    .grid{
      gap:12px;
    }
    .card{
      padding:12px;
    }
    h2{
      font-size:18px;
      -webkit-line-clamp:2;
    }
    .info{
      font-size:12px;
      gap:6px;
    }
    .footer{
      padding:8px 16px;
      font-size:11px;
    }
  }

</style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <div class="header-left">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Universidad_Cat%C3%B3lica_Argentina.png/240px-Universidad_Cat%C3%B3lica_Argentina.png" alt="UCA">
        <div>
          <h1>UCA · Pantalla institucional</h1>
          <div class="sub" id="subtitle">Materias próximas y en curso</div>
        </div>
      </div>
      <div class="clock">
        <div class="clock-time" id="clock"></div>
        <div class="clock-sub">Actualización en vivo</div>
      </div>
    </div>

    <div class="legend">
      <div class="pill eco">Económicas</div>
      <div class="pill der">Derecho y Cs. Sociales</div>
      <div class="pill sal">Cs. de la Salud</div>
      <div class="pill qui">Química e Ingeniería</div>
      <div class="pill status-soon">Próximamente</div>
      <div class="pill status-live">En curso</div>
    </div>

    <div class="content" id="content"></div>

    <div class="footer">
      <span>Sistema de información académica · Pantalla tipo aeropuerto</span>
      <span id="footerCount"></span>
    </div>
  </div>

  <script>
    const data = [
      { facultad: "económicas", dia: "jueves", materia: "Administración", comision: "75AM", horario: "09:40 a 11:40", aula: "209 · Edificio 3" },
      { facultad: "económicas", dia: "jueves", materia: "Contabilidad", comision: "75FM", horario: "09:40 a 11:40", aula: "2-N · Edificio 1" },
      { facultad: "económicas", dia: "jueves", materia: "Estadística", comision: "75AM", horario: "09:40 a 11:40", aula: "103 · Edificio 3" },
      { facultad: "económicas", dia: "jueves", materia: "Macroeconomía", comision: "75CM", horario: "09:40 a 11:40", aula: "201 · Edificio 3" },
      { facultad: "económicas", dia: "jueves", materia: "Introducción a la Teología", comision: "75AM", horario: "09:40 a 11:40", aula: "202 · Edificio 3" },
      { facultad: "económicas", dia: "jueves", materia: "Dirección Comercial", comision: "75AM", horario: "07:30 a 10:30", aula: "301/302 · Edificio 4" },
      { facultad: "derecho", dia: "jueves", materia: "Derecho Ambiental y Recursos Naturales", comision: "74MM", horario: "09:40 a 12:50", aula: "303 · Edificio 3" },
      { facultad: "derecho", dia: "jueves", materia: "Derecho Sucesorio", comision: "74MM", horario: "09:40 a 11:40", aula: "S-07 · Edificio 3" },
      { facultad: "derecho", dia: "jueves", materia: "Introducción al Derecho", comision: "74CM", horario: "09:40 a 12:50", aula: "201 · Edificio 2" },
      { facultad: "derecho", dia: "jueves", materia: "Taller de escritura jurídica y uso de las fuentes de información", comision: "74BM", horario: "09:40 a 12:50", aula: "1-A · Edificio 1" },
      { facultad: "salud", dia: "jueves", materia: "Alteraciones del Lenguaje y Comunicación en Niños I", comision: "34BM", horario: "09:40 a 11:40", aula: "305 · Edificio 4" },
      { facultad: "salud", dia: "jueves", materia: "Introducción a la Teología", comision: "34DM", horario: "09:40 a 11:40", aula: "401 · Edificio 4" },
      { facultad: "salud", dia: "jueves", materia: "Microbiología y Toxicología", comision: "34AM", horario: "09:40 a 11:40", aula: "2-I · Edificio 1" },
      { facultad: "salud", dia: "jueves", materia: "Neurología II", comision: "34BM", horario: "09:40 a 11:40", aula: "304 · Edificio 4" },
      { facultad: "salud", dia: "jueves", materia: "Química Básica", comision: "34AM", horario: "09:40 a 11:40", aula: "2-M · Edificio 1" },
      { facultad: "quimica", dia: "jueves", materia: "Cálculo Elemental", comision: "70AM", horario: "09:40 a 11:40", aula: "312 · Edificio 3" },
      { facultad: "quimica", dia: "jueves", materia: "Representación Gráfica", comision: "70AM", horario: "09:40 a 11:40", aula: "102 · Edificio 4" },
      { facultad: "quimica", dia: "jueves", materia: "Estabilidad", comision: "70AM", horario: "09:40 a 12:30", aula: "204 · Edificio 3" },
      { facultad: "quimica", dia: "jueves", materia: "Introducción a la Ingeniería", comision: "70BM", horario: "09:40 a 11:00", aula: "1-C · Edificio 1" },
      { facultad: "quimica", dia: "jueves", materia: "Química Analítica", comision: "70AM", horario: "10:15 a 11:40", aula: "PB-001 · Edificio 4" }
    ];

    const facultyOrder = ["económicas", "derecho", "salud", "quimica"];
    const facultyLabel = {
      "económicas": "Económicas",
      "derecho": "Derecho y Cs. Sociales",
      "salud": "Salud",
      "quimica": "Química e Ing."
    };

    const content = document.getElementById("content");
    const footerCount = document.getElementById("footerCount");
    const clock = document.getElementById("clock");
    const subtitle = document.getElementById("subtitle");

    let currentPage = 0;
    let visiblePages = [];

    function parseRange(range) {
      const [start, end] = range.split(" a ");
      const [sh, sm] = start.split(":").map(Number);
      const [eh, em] = end.split(":").map(Number);
      return { start: sh * 60 + sm, end: eh * 60 + em };
    }

    function dayNameES(date) {
      return date.toLocaleDateString("es-AR", { weekday: "long" }).toLowerCase();
    }

    function minutesNow(date) {
      return date.getHours() * 60 + date.getMinutes();
    }

    function enrichItems() {
      const now = new Date();
      const day = dayNameES(now);
      const mins = minutesNow(now);
      subtitle.textContent = `${day.charAt(0).toUpperCase() + day.slice(1)} · Materias próximas y en curso`;

      const visibles = data
        .filter(item => item.dia === day)
        .map(item => {
          const slot = parseRange(item.horario);
          const upcoming = mins >= slot.start - 15 && mins < slot.start;
          const active = mins >= slot.start && mins < slot.end;
          const status = active ? "live" : upcoming ? "soon" : "off";
          return { ...item, status };
        })
        .filter(item => item.status !== "off")
        .sort((a, b) => facultyOrder.indexOf(a.facultad) - facultyOrder.indexOf(b.facultad));

      return visibles;
    }

    function chunk(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
      return out;
    }

    function createCard(item) {
      return `
        <div class="card ${item.facultad}">
          <div>
            <div class="topline">
              <div class="faculty-tag">${facultyLabel[item.facultad]}</div>
              <div class="status-tag ${item.status === "live" ? "live" : "soon"}">
                ${item.status === "live" ? "EN CURSO" : "PRÓXIMAMENTE"}
              </div>
            </div>
            <h2 class="title">${item.materia}</h2>
          </div>
          <div class="info">
            <div class="info-row"><span class="icon">📍</span><span>${item.aula}</span></div>
            <div class="info-row"><span class="icon">👥</span><span>${item.comision}</span></div>
            <div class="info-row"><span class="icon">🕒</span><span>${item.horario}</span></div>
          </div>
        </div>
      `;
    }

    function render() {
      const visibles = enrichItems();
      visiblePages = chunk(visibles, 8);
      if (currentPage >= visiblePages.length) currentPage = 0;

      if (!visibles.length) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-box">
              <h2>En este momento no hay materias visibles</h2>
              <p>La pantalla se actualizará automáticamente 15 minutos antes del inicio de cada clase y durante el horario en curso.</p>
            </div>
          </div>
        `;
      } else {
        const page = visiblePages[currentPage] || [];
        content.innerHTML = `<div class="grid">${page.map(createCard).join("")}</div>`;
      }

      footerCount.textContent = `${visibles.length} materias visibles ahora · rotación cada 8 segundos`;
    }

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleString("es-AR", {
        weekday: "short",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    updateClock();
    render();

    setInterval(() => {
      updateClock();
      render();
    }, 1000);

    setInterval(() => {
      if (visiblePages.length > 1) {
        currentPage = (currentPage + 1) % visiblePages.length;
        render();
      }
    }, 8000);
  </script>
</body>
</html>
