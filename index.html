<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCA · Distribución de aulas</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#fff;
    overflow:hidden;
    cursor:none;
  }
  .screen{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,#0a2448 0%, #0d2f5f 35%, #102846 100%);
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:clamp(12px, 1.3vw, 20px) clamp(14px, 1.8vw, 24px) clamp(8px, .9vw, 14px);
    border-bottom:1px solid rgba(255,255,255,.12);
  }
  .header-left{
    display:flex;
    align-items:center;
    gap:clamp(10px, 1.2vw, 16px);
  }
  .logo{
    width:clamp(46px, 4vw, 72px);
    height:clamp(46px, 4vw, 72px);
    object-fit:contain;
    display:block;
    filter: brightness(0) invert(1);
  }
  .title{
    font-size:clamp(22px, 2vw, 31px);
    font-weight:800;
    line-height:1.05;
    letter-spacing:.2px;
  }
  .sub{
    color:#d7e2f0;
    font-size:clamp(12px, .95vw, 16px);
    margin-top:3px;
  }
  .clock{
    text-align:right;
  }
  .clock-time{
    font-size:clamp(16px, 1.45vw, 23px);
    font-weight:800;
  }
  .clock-sub{
    color:#b6c4d7;
    font-size:clamp(10px, .8vw, 13px);
    margin-top:2px;
  }
  .legend{
    display:flex;
    gap:clamp(6px, .8vw, 10px);
    padding:clamp(8px, .9vw, 14px) clamp(14px, 1.8vw, 24px) 0;
    flex-wrap:wrap;
  }
  .pill{
    padding:clamp(6px, .7vw, 9px) clamp(10px, 1vw, 15px);
    border-radius:20px;
    font-size:clamp(11px, .9vw, 14px);
    font-weight:800;
  }
  .eco{background:#f97316;color:#fff}
  .der{background:#7c3aed;color:#fff}
  .sal{background:#3b82f6;color:#fff}
  .qui{background:#facc15;color:#111}
  .content{
    flex:1;
    padding:clamp(12px, 1.2vw, 18px) clamp(14px, 1.8vw, 24px);
    min-height:0;
    display:flex;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap:clamp(12px, 1.2vw, 20px);
    align-items:stretch;
    align-content:stretch;
    width:100%;
    height:100%;
  }
  .grid.rows-1{grid-template-rows:1fr;}
  .grid.rows-2{grid-template-rows:repeat(2, minmax(0,1fr));}
  .card{
    background:#f6f7fb;
    color:#111;
    border-radius:22px;
    padding:clamp(12px, 1vw, 18px);
    min-height:0;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 14px 34px rgba(0,0,0,.26);
    border:1px solid rgba(0,0,0,.04);
    animation:fadeInUp .55s ease both;
    overflow:hidden;
  }
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(14px) scale(.985);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }
  .fac{
    padding:clamp(6px, .65vw, 9px) clamp(10px, .9vw, 14px);
    border-radius:20px;
    font-size:clamp(11px, .9vw, 14px);
    color:#fff;
    font-weight:800;
    line-height:1.1;
    max-width:180px;
    text-align:center;
  }
  .status{
    color:#fff;
    padding:clamp(6px, .65vw, 9px) clamp(10px, .9vw, 14px);
    font-size:clamp(11px, .9vw, 14px);
    border-radius:20px;
    font-weight:800;
    white-space:nowrap;
  }
  .status.live{background:#10b981}
  .status.soon{background:#9ca3af}
  .status.alert-badge{background:#b91c1c}
  .status.change-badge{background:#b91c1c}

  .card.eco .fac{background:#f97316}
  .card.der .fac{background:#7c3aed}
  .card.sal .fac{background:#3b82f6}
  .card.qui .fac{background:#facc15;color:#111}

  .card.eco h2{color:#f97316}
  .card.der h2{color:#7c3aed}
  .card.sal h2{color:#3b82f6}
  .card.qui h2{color:#b98900}

  .card.alert{
    background:#dc2626 !important;
    color:#fff !important;
    border:1px solid rgba(255,255,255,.10);
  }
  .card.alert .fac{
    background:unset !important;
  }
  .card.alert h2,
  .card.alert .alert-message,
  .card.alert .info{
    color:#fff !important;
  }
  .card.alert .icon-wrap{color:#fff !important;}

  .card.change{
    background:#dc2626 !important;
    color:#fff !important;
    border:1px solid rgba(255,255,255,.10);
  }
  .card.change .fac{
    background:unset !important;
  }
  .card.change h2,
  .card.change .alert-message,
  .card.change .info{
    color:#fff !important;
  }
  .card.change .icon-wrap{
    color:#fff !important;
  }

  .card.alert.eco .fac, .card.change.eco .fac{background:#f97316 !important;color:#fff !important;}
  .card.alert.der .fac, .card.change.der .fac{background:#7c3aed !important;color:#fff !important;}
  .card.alert.sal .fac, .card.change.sal .fac{background:#3b82f6 !important;color:#fff !important;}
  .card.alert.qui .fac, .card.change.qui .fac{background:#facc15 !important;color:#111 !important;}

  h2{
    font-size:clamp(18px, 1.45vw, 24px);
    line-height:1.12;
    margin:clamp(8px, .8vw, 12px) 0 0 0;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
    font-weight:800;
  }
  .alert-message{
    margin-top:clamp(6px, .7vw, 10px);
    font-size:clamp(12px, .95vw, 15px);
    font-weight:800;
    line-height:1.22;
    opacity:.98;
  }
  .info{
    font-size:clamp(12px, 1vw, 17px);
    display:flex;
    flex-direction:column;
    gap:clamp(6px, .7vw, 10px);
  }
  .info-line{
    display:flex;
    align-items:center;
    gap:clamp(7px, .7vw, 11px);
  }
  .icon-wrap{
    width:clamp(16px, 1.3vw, 24px);
    height:clamp(16px, 1.3vw, 24px);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex:0 0 clamp(16px, 1.3vw, 24px);
  }
  .icon-svg{
    width:clamp(15px, 1.15vw, 22px);
    height:clamp(15px, 1.15vw, 22px);
    stroke:currentColor;
    fill:none;
    stroke-width:1.9;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .card.eco .icon-wrap{color:#f97316}
  .card.der .icon-wrap{color:#7c3aed}
  .card.sal .icon-wrap{color:#3b82f6}
  .card.qui .icon-wrap{color:#b98900}

  .footer{
    display:flex;
    justify-content:space-between;
    padding:clamp(8px, .9vw, 14px) clamp(14px, 1.8vw, 24px);
    color:#d7e2f0;
    border-top:1px solid rgba(255,255,255,.12);
    font-size:clamp(11px, .9vw, 15px);
  }
  .empty{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .empty-box{
    border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.06);
    border-radius:28px;
    padding:42px;
    text-align:center;
    width:min(980px,100%);
  }
  .empty-box h2{font-size:36px;color:#fff}
  .empty-box p{color:#d4dbe5;font-size:18px;margin-top:12px}

  @media (max-width: 1200px){
    .grid{
      grid-template-columns:repeat(3, minmax(0,1fr));
      height:auto;
    }
    .card{
      height:auto;
      min-height:220px;
    }
  }

  @media (max-width: 900px){
    body{
      overflow:auto;
      cursor:auto;
    }
    .screen{
      min-height:100vh;
      height:auto;
    }
    .header{
      flex-direction:column;
      align-items:flex-start;
    }
    .clock{
      text-align:left;
    }
    .grid{
      grid-template-columns:repeat(2, minmax(0,1fr));
      height:auto;
    }
    .card{
      height:auto;
      min-height:220px;
    }
    .footer{
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }
  }

  @media (max-width: 640px){
    body{
      overflow:auto;
      cursor:auto;
    }
    .grid{
      grid-template-columns:1fr;
      height:auto;
    }
    .card{
      height:auto;
      min-height:200px;
    }
    .top{
      flex-direction:column;
      align-items:flex-start;
    }
    .fac,
    .status{
      max-width:100%;
    }
  }

  @media (max-height: 820px){
    .header{
      padding:10px 14px 8px;
    }
    .logo{
      width:44px;
      height:44px;
    }
    .title{
      font-size:24px;
    }
    .sub{
      font-size:12px;
      margin-top:2px;
    }
    .clock-time{
      font-size:18px;
    }
    .clock-sub{
      font-size:10px;
      margin-top:2px;
    }
    .legend{
      padding:8px 14px 0;
      gap:6px;
    }
    .pill{
      padding:6px 10px;
      font-size:11px;
    }
    .content{
      padding:10px 14px;
    }
    .grid{
      gap:12px;
    }
    .card{
      padding:12px;
    }
    h2{
      font-size:18px;
      -webkit-line-clamp:2;
    }
    .info{
      font-size:12px;
      gap:6px;
    }
    .footer{
      padding:8px 14px;
      font-size:11px;
    }
  }

  @media (min-width: 1000px) and (min-height: 700px){
    .content{
      display:flex;
    }
    .grid{
      height:100%;
    }
  }

</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="header-left">
      <img class="logo" src="./logo.png" alt="UCA">
      <div>
        <div class="title">UCA · Distribución de aulas</div>
        <div class="sub" id="subtitle">Materias próximas y en curso</div>
      </div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock">--:--</div>
      <div class="clock-sub">Actualización en vivo</div>
    </div>
  </div>

  <div class="legend">
    <div class="pill eco">Económicas</div>
    <div class="pill der">Derecho y Cs Sociales</div>
    <div class="pill sal">Salud</div>
    <div class="pill qui">Química e Ingeniería</div>
  </div>

  <div class="content" id="content"></div>

  <div class="footer">
    <div>Sistema académico</div>
    <div id="footerCount">0 materias en este momento</div>
  </div>
</div>

<script>
const rotationMs = 8000;
const TEST_MODE = false;
const TEST_DAY = "viernes";
const TEST_TIME = 600;
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNK3qYBQUNE0skOye3iYuXE1bSxw2cfmBUjMF1ATBwcJjOP7IwuIo3kPu36KV0Gm-8N61cN9xismYB/pub?output=csv";

const facultyOrder = ["economicas","derecho","salud","quimica"];
const facultyLabel = {
  "economicas":"Económicas",
  "derecho":"Derecho y Cs Sociales",
  "salud":"Salud",
  "quimica":"Química"
};
const facultyClass = {
  "economicas":"eco",
  "derecho":"der",
  "salud":"sal",
  "quimica":"qui"
};

const content = document.getElementById('content');
const footerCount = document.getElementById('footerCount');
const subtitle = document.getElementById('subtitle');
const clockEl = document.getElementById('clock');

let data = [];
let page = 0;
let pages = [];

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];
    if(char === '"'){
      if(inQuotes && next === '"'){ cell += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if(char === ',' && !inQuotes){
      row.push(cell); cell = "";
    } else if((char === '\n' || char === '\r') && !inQuotes){
      if(char === '\r' && next === '\n') i++;
      if(cell.length || row.length){
        row.push(cell); rows.push(row); row = []; cell = "";
      }
    } else {
      cell += char;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function normalizeText(value){
  return (value || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function parseRange(range){
  const [start, end] = range.split(' a ');
  const [sh, sm] = start.replace('.', ':').split(':').map(Number);
  const [eh, em] = end.replace('.', ':').split(':').map(Number);
  return { start: sh*60 + sm, end: eh*60 + em };
}

function getNowContext(){
  if(TEST_MODE){
    const hours = Math.floor(TEST_TIME/60).toString().padStart(2,'0');
    const mins = (TEST_TIME%60).toString().padStart(2,'0');
    return { day: TEST_DAY, normalizedDay: normalizeText(TEST_DAY), minutes: TEST_TIME, label: `${TEST_DAY}, ${hours}:${mins}` };
  }
  const now = new Date();
  const day = now.toLocaleDateString('es-AR', { weekday:'long' }).toLowerCase();
  const minutes = now.getHours()*60 + now.getMinutes();
  const label = now.toLocaleString('es-AR', { weekday:'long', hour:'2-digit', minute:'2-digit' });
  return { day, normalizedDay: normalizeText(day), minutes, label };
}

function chunk(arr,size){
  const out = [];
  for(let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

async function loadData(){
  const res = await fetch(SHEET_URL + (SHEET_URL.includes("?") ? "&" : "?") + "_t=" + Date.now(), { cache: "no-store" });
  const text = await res.text();
  const rows = parseCSV(text);
  if(rows.length <= 1) return [];

  const headers = rows[0].map(h => normalizeText(h));
  const idx = {
    id: headers.indexOf("id"),
    dia: headers.indexOf("dia"),
    facultad: headers.indexOf("facultad"),
    materia: headers.indexOf("materia"),
    comision: headers.indexOf("comision"),
    horario_inicio: headers.indexOf("horario_inicio"),
    horario_fin: headers.indexOf("horario_fin"),
    aula: headers.indexOf("aula"),
    edificio: headers.indexOf("edificio"),
    estado: headers.indexOf("estado"),
    mensaje: headers.indexOf("mensaje"),
    visible: headers.indexOf("visible")
  };

  return rows.slice(1)
    .filter(cols => cols.some(c => c && c.trim() !== ""))
    .map(cols => {
      const diaRaw = cols[idx.dia] || "";
      const facRaw = cols[idx.facultad] || "";
      const visibleRaw = (cols[idx.visible] || "").trim().toLowerCase();
      return {
        id: cols[idx.id] || "",
        dia: diaRaw.trim(),
        diaNorm: normalizeText(diaRaw),
        facultad: normalizeText(facRaw),
        materia: (cols[idx.materia] || "").trim(),
        comision: (cols[idx.comision] || "").trim(),
        horario_inicio: (cols[idx.horario_inicio] || "").trim(),
        horario_fin: (cols[idx.horario_fin] || "").trim(),
        horario: `${(cols[idx.horario_inicio] || "").trim()} a ${(cols[idx.horario_fin] || "").trim()}`,
        aula: `${(cols[idx.aula] || "").trim()} · ${(cols[idx.edificio] || "").trim()}`.replace(/^ · | · $/g, ""),
        estado: ((cols[idx.estado] || "normal").trim().toLowerCase() || "normal"),
        mensaje: (cols[idx.mensaje] || "").trim(),
        visible: visibleRaw === "si" || visibleRaw === "sí" || visibleRaw === "true" || visibleRaw === "1"
      };
    });
}

function getVisible(){
  const ctx = getNowContext();
  subtitle.textContent = `${ctx.day.charAt(0).toUpperCase()+ctx.day.slice(1)} · Materias próximas y en curso`;
  clockEl.textContent = ctx.label;

  return data
    .filter(item => item.visible)
    .filter(item => item.diaNorm === ctx.normalizedDay)
    .map(item => {
      const slot = parseRange(item.horario);
      const live = ctx.minutes >= slot.start && ctx.minutes < slot.end;
      const soon = ctx.minutes >= slot.start - 15 && ctx.minutes < slot.start;
      return { ...item, live, soon, slotStart:slot.start };
    })
    .filter(item => item.live || item.soon)
    .sort((a,b) => {
      const order = facultyOrder.indexOf(a.facultad) - facultyOrder.indexOf(b.facultad);
      if(order !== 0) return order;
      return a.slotStart - b.slotStart;
    });
}

function createCard(item){
  const locationIcon = `<span class="icon-wrap"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-6-4.35-6-10a6 6 0 1 1 12 0c0 5.65-6 10-6 10Z"></path><circle cx="12" cy="11" r="2.5"></circle></svg></span>`;
  const groupIcon = `<span class="icon-wrap"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="8" r="3"></circle><path d="M20 21v-1a4 4 0 0 0-3-3.87"></path><path d="M14 5.13a3 3 0 0 1 0 5.74"></path></svg></span>`;
  const timeIcon = `<span class="icon-wrap"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg></span>`;
  const visualClass = facultyClass[item.facultad] || '';
  const isSuspended = item.estado === 'suspendida';
  const isChange = item.estado === 'cambio' || item.estado === 'cambio_aula' || item.estado === 'cambio_horario';

  let cardExtraClass = '';
  let badgeClass = item.live ? 'live' : 'soon';
  let badgeText = item.live ? 'EN CURSO' : 'PRÓXIMAMENTE';

  if(isSuspended){
    cardExtraClass = 'alert';
    badgeClass = 'alert-badge';
    badgeText = 'SUSPENDIDA';
  } else if(isChange){
    cardExtraClass = 'change';
    badgeClass = 'change-badge';
    badgeText = item.estado === 'cambio_horario' ? 'CAMBIO DE HORARIO' : 'CAMBIO DE AULA';
  }

  const note = (isSuspended || isChange) && item.mensaje ? `<div class="alert-message">${item.mensaje}</div>` : '';

  return `
    <div class="card ${visualClass} ${cardExtraClass}">
      <div>
        <div class="top">
          <div class="fac">${facultyLabel[item.facultad] || item.facultad}</div>
          <div class="status ${badgeClass}">${badgeText}</div>
        </div>
        <h2>${item.materia}</h2>
        ${note}
      </div>
      <div class="info">
        <div class="info-line">${locationIcon}<span>${item.aula}</span></div>
        <div class="info-line">${groupIcon}<span>${item.comision}</span></div>
        <div class="info-line">${timeIcon}<span>${item.horario}</span></div>
      </div>
    </div>`;
}

function render(){
  const visible = getVisible();
  pages = chunk(visible, 8);
  if(page >= pages.length) page = 0;

  if(!visible.length){
    content.innerHTML = `<div class="empty"><div class="empty-box"><h2>En este momento no hay materias en curso</h2><p>La pantalla muestra materias 15 minutos antes de su inicio y durante su cursado real.</p></div></div>`;
  } else {
    const current = pages[page] || [];
    const rowsClass = window.innerWidth >= 1000 ? ` rows-${Math.min(2, Math.max(1, Math.ceil(current.length / 4)))}` : '';
    content.innerHTML = `<div class="grid${rowsClass}">${current.map(createCard).join('')}</div>`;
  }
  footerCount.textContent = `${visible.length} materias en este momento`;
}

async function refreshDataAndRender(){
  try{
    data = await loadData();
    render();
  } catch(error){
    content.innerHTML = `<div class="empty"><div class="empty-box"><h2>Error al cargar la planilla</h2><p>Revisá que la hoja esté publicada como CSV y que los encabezados coincidan con la plantilla.</p></div></div>`;
    console.error(error);
  }
}

refreshDataAndRender();
setInterval(refreshDataAndRender, 60000);
setInterval(() => { location.reload(); }, 1000 * 60 * 10);
setInterval(() => {
  if(pages.length > 1){
    page = (page + 1) % pages.length;
    render();
  }
}, rotationMs);

document.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});
</script>
</body>
</html>
